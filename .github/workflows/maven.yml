name: CI

on:
  push:
    branches:
      - 'main'
      - 'release-v**'
      - 'full-sonar-analysis-**'
  pull_request:

jobs:
  build:
    name: Build OS ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Enable long paths for Git
        run: git config --global core.longpaths true

      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      # --- New Step: Build Powsybl Core Snapshot ---
      - name: Checkout Powsybl Core
        uses: actions/checkout@v4
        with:
          repository: powsybl/powsybl-core
          path: powsybl-core
          ref: 'features/sensitivity-analysis-resultwriter-enhancements'

      - name: Build and Install Powsybl Core
        working-directory: ./powsybl-core
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            mvnw.cmd install -DskipTests -Dspotless.check.skip
          else
            ./mvnw install -DskipTests -Dspotless.check.skip
          fi
        shell: bash

      - name: Build with Maven (Ubuntu / MacOS)
        if: matrix.os != 'windows-latest'
        run: ./mvnw --batch-mode -Pjacoco install

      - name: Build with Maven (Windows)
        if: matrix.os == 'windows-latest'
        run: mvnw.cmd --batch-mode install
        shell: cmd

      - name: Run SonarCloud analysis
        if: matrix.os == 'ubuntu-latest'
        run: >
          ./mvnw --batch-mode -DskipTests sonar:sonar
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.organization=powsybl-ci-github
          -Dsonar.projectKey=com.powsybl:powsybl-open-loadflow
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
