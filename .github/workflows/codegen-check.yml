#
# Guard for the single-source equation codegen. One residual source per family
# (codegen/equations/<family>.py) renders BOTH the scalar CPU Java and the fused
# CUDA kernel via SymPy autodiff + Jinja.
#
#   render-up-to-date  re-renders and fails on any diff — catches a hand-edit of a
#                      generated source or a stale render. SymPy + Jinja run in the
#                      render path, so this guard is an ALERT: a SymPy/Jinja version
#                      bump that reformats a body shows a clear diff and is simply
#                      re-committed (it is not a determinism contract).
#   formulas-proven    re-derives and proves both targets signature-locked +
#                      numerically equivalent to the golden snapshot + consistent
#                      under an autodiff finite-difference audit. NOT a textual diff,
#                      so it is robust to SymPy/Jinja formatting.
#
# This is the ONLY place python touches the project; the normal Maven build and
# every contributor stay python-free.
name: codegen-check

on:
  push:
  pull_request:

jobs:
  render-up-to-date:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install pinned SymPy + Jinja
        run: pip install -r codegen/requirements.txt

      - name: Render generated sources from the residual specs
        run: python3 codegen/generate.py

      - name: Alert if generated sources are stale or hand-edited
        run: |
          if ! git diff --quiet; then
            echo "::warning::Generated .java/.cuh differ from a fresh render."
            echo "If you changed a residual spec: run codegen/regenerate.sh and commit."
            echo "If this is only SymPy/Jinja reformatting after a version bump: re-commit the new render."
            git --no-pager diff --stat
            git --no-pager diff
            exit 1
          fi
          echo "Generated sources are up to date."

  formulas-proven:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install pinned SymPy + Jinja
        run: pip install -r codegen/requirements.txt

      - name: Prove equivalence (signatures + 1e-12 numeric, scalar + fused + autodiff)
        run: python3 codegen/prove_equivalence.py

      - name: Check scatter stamp matches OLF equation-system wiring
        run: python3 codegen/check_scatter.py
